<html lang="en">

<style>
/* MUTAHUS_STEP52_LOGIN_MOBILE_CLEAN_FINAL */

@media (max-width: 860px) {
    html,
    body {
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 !important;
        overflow-x: hidden !important;
        background: #eef5ff !important;
    }

    *,
    *::before,
    *::after {
        box-sizing: border-box !important;
    }

    body.login-clean-page {
        min-height: 100dvh !important;
        position: relative !important;
        isolation: isolate !important;
        background:
            linear-gradient(180deg, #eef5ff 0%, #f8fbff 100%) !important;
    }

    body.login-clean-page::before,
    body.login-clean-page::after {
        content: "" !important;
        position: fixed !important;
        border-radius: 50% !important;
        pointer-events: none !important;
        z-index: -1 !important;
        filter: blur(4px) !important;
    }

    body.login-clean-page::before {
        width: 220px !important;
        height: 220px !important;
        top: 18% !important;
        right: -90px !important;
        background: rgba(29, 111, 209, 0.16) !important;
        animation: mutahusFloatOne 7s ease-in-out infinite !important;
    }

    body.login-clean-page::after {
        width: 180px !important;
        height: 180px !important;
        left: -85px !important;
        bottom: 10% !important;
        background: rgba(96, 165, 250, 0.12) !important;
        animation: mutahusFloatTwo 9s ease-in-out infinite !important;
    }

    @keyframes mutahusFloatOne {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(-18px, 24px, 0) scale(1.08); }
    }

    @keyframes mutahusFloatTwo {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(24px, -18px, 0) scale(1.06); }
    }

    /* ONE CONSISTENT MOBILE TOP TASKBAR */
    body.login-clean-page header.top-taskbar {
        position: sticky !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        min-height: 68px !important;
        margin: 0 !important;
        padding: calc(10px + env(safe-area-inset-top, 0px)) 14px 10px !important;
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
        justify-content: space-between !important;
        gap: 10px !important;
        background: rgba(15, 60, 104, 0.98) !important;
        border: 0 !important;
        border-radius: 0 !important;
        box-shadow: 0 8px 24px rgba(15, 60, 104, 0.16) !important;
        backdrop-filter: blur(14px) !important;
        -webkit-backdrop-filter: blur(14px) !important;
        z-index: 5000 !important;

    body.login-clean-page header.top-taskbar.login-mobile-duplicate {

    }

    body.login-clean-page .brand-block {

        min-width: 0 !important;

        margin: 0 !important;
        padding: 0 !important;

        align-items: center !important;
        gap: 10px !important;

    }

    body.login-clean-page .brand-icon {
        position: relative !important;
        z-index: 2 !important;
        width: 42px !important;
        min-width: 42px !important;
        height: 42px !important;
        margin: 0 !important;
        display: grid !important;
        place-items: center !important;

        background: rgba(255, 255, 255, 0.14) !important;

        font-weight: 900 !important;

        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;

    body.login-clean-page .brand-block small {

        color: rgba(255, 255, 255, 0.78) !important;

        line-height: 1.2 !important;

    body.login-clean-page .mobile-menu-btn {

        flex: 0 0 44px !important;
        width: 44px !important;
        min-width: 44px !important;
        height: 44px !important;
        margin: 0 !important;

        align-items: center !important;
        justify-content: center !important;
        border-radius: 14px !important;
        border: 1px solid rgba(255, 255, 255, 0.20) !important;

        color: #ffffff !important;
        font-size: 22px !important;
        line-height: 1 !important;
        box-shadow: none !important;
    }

    body.login-clean-page .taskbar-links {
        display: none !important;
        position: fixed !important;
        top: calc(72px + env(safe-area-inset-top, 0px)) !important;
        left: 12px !important;
        right: 12px !important;
        width: auto !important;
        max-width: calc(100vw - 24px) !important;
        max-height: calc(100dvh - 94px - env(safe-area-inset-top, 0px)) !important;
        margin: 0 !important;
        padding: 10px !important;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 8px !important;
        border: 1px solid #d9e5f5 !important;
        border-radius: 20px !important;
        background: #ffffff !important;
        box-shadow: 0 20px 50px rgba(15, 60, 104, 0.22) !important;
        z-index: 5001 !important;
    }

    body.login-clean-page .taskbar-links.show-mobile-menu {
        display: grid !important;
    }

    body.login-clean-page .taskbar-links a {
        width: 100% !important;
        min-width: 0 !important;
        min-height: 44px !important;
        margin: 0 !important;
        padding: 10px 8px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        border: 0 !important;
        border-radius: 13px !important;
        background: #f4f8ff !important;
        color: #123f73 !important;
        text-align: center !important;
        text-decoration: none !important;
        white-space: normal !important;

        font-weight: 900 !important;
    }

    body.login-clean-page .taskbar-links a.admin-pill {

    /* Hide the large blue information panel on mobile.

    body.login-clean-page .auth-page-pro,

    body.login-clean-page .form-header .form-icon {

    body.login-clean-page.parent-login-page .form-header .form-icon {

    }

    body.login-clean-page .form-header h1 {

        font-size: 29px !important;
        line-height: 1.1 !important;
        letter-spacing: -0.5px !important;
    }

    body.login-clean-page .form-header p {
        margin: 0 !important;
        color: #6a7e95 !important;
        font-size: 13.5px !important;
        line-height: 1.5 !important;
    }

    body.login-clean-page form {
        display: grid !important;

    body.login-clean-page form label {
        margin-top: 7px !important;

    body.login-clean-page form input {

        min-width: 0 !important;

    body.login-clean-page .form-link-row {

    body.login-clean-page .form-link-row a {

    body.login-clean-page .auth-extra-actions {

    body.login-clean-page .small-text {

    body.login-clean-page::after {

</style>

<body class="login-clean-page parent-login-page">

<header class="top-taskbar">
    <a href="index.html" class="brand-block">
        <span class="brand-icon">🚐</span>
        <div>
            <strong>Mutahus Global</strong>
            <small>School Van Service</small>
        </div>
    </a>

    <button class="mobile-menu-btn" type="button" onclick="toggleMobileMenu()" aria-label="Open menu">☰</button>

    <nav class="taskbar-links" id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="index.html#service">Service</a>
        <a href="index.html#schools">Schools</a>
        <a href="terms-rules.html">Rules</a>
        <a href="parent-register.html">Register</a>
        <a href="parent-login.html" class="active">Parent Login</a>
        <a href="admin-login.html" class="admin-pill">Admin</a>
    </nav>
</header>

<main class="auth-page-pro">
    <section class="auth-info-panel">
        <div class="badge-pro">PARENT PORTAL</div>
        <h1>Welcome Back, Parent</h1>
    </section>

    <section class="auth-card-pro">
        <div class="form-header">
            <h1>Parent Login</h1>
            <p>Enter your registered email and password.</p>
        </div>

        <form onsubmit="parentLogin(event)">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" placeholder="parent@email.com" autocomplete="email" required>

            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required>

            <div class="form-link-row" style="display:flex;">
                <a href="parent-forgot-password.html">Forgot password?</a>
            </div>

            <button class="btn btn-primary-pro full-btn" type="submit">Log In</button>
        </form>

        <div class="auth-extra-actions" style="display:flex; flex-wrap:wrap; align-items:center; justify-content:center;">
            <span class="small-text">New parent?</span>
            <a href="parent-register.html" class="btn btn-light-pro">Create Account</a>
        </div>
    </section>
</main>

<script src="app.js"></script>

<script>
(function () {
    const mobileQuery = window.matchMedia("(max-width: 860px)");

    function keepOneLoginTopbar() {
        const headers = Array.from(document.querySelectorAll("header.top-taskbar"));

        headers.forEach(function (header) {
            header.classList.remove("login-mobile-duplicate");
            header.removeAttribute("aria-hidden");
        });

        if (!mobileQuery.matches || headers.length <= 1) return;

        headers.slice(1).forEach(function (header) {
            header.classList.add("login-mobile-duplicate");
            header.setAttribute("aria-hidden", "true");
        });
    }

    function bindMenuClose() {
        if (!mobileQuery.matches) return;

        const firstHeader = document.querySelector("header.top-taskbar:not(.login-mobile-duplicate)");
        if (!firstHeader) return;

        const menu = firstHeader.querySelector(".taskbar-links");
        if (!menu) return;

        menu.querySelectorAll("a").forEach(function (link) {
            if (link.dataset.step52Bound === "true") return;
            link.dataset.step52Bound = "true";

            link.addEventListener("click", function () {
                menu.classList.remove("show-mobile-menu");
            });
        });
    }

    function runLoginMobileFix() {
        keepOneLoginTopbar();
        bindMenuClose();
    }

    document.addEventListener("DOMContentLoaded", runLoginMobileFix);
    window.addEventListener("load", runLoginMobileFix);
    window.addEventListener("resize", runLoginMobileFix);
    window.addEventListener("orientationchange", runLoginMobileFix);

    const observer = new MutationObserver(function () {
        if (mobileQuery.matches) runLoginMobileFix();
    });

    document.addEventListener("DOMContentLoaded", function () {
        if (document.body) {
            observer.observe(document.body, {
                childList: true,
                subtree: true
            });
        }
    });
})();
</script>

</body>
